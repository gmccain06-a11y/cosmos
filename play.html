<!DOCTYPE html>
<html>
<head>
    <title>Music Player</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: transparent; }
    </style>
</head>
<body>
    <!-- IMPORTANT: Make sure the src path is correct from this file's location! -->
    <audio id="ambient-sound" loop>
        <source src="cosmos.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('ambient-sound');
        // We'll let the main page control play/pause
        function toggleMusic() {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }
    </script>
</body>
</html>
